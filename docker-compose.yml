version: '3.8'
services:
  postgis:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transit_rentals
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  api:
    build: ./apps/api
    command: npm run start:dev
    ports:
      - "4000:4000"
    depends_on:
      - postgis
      - redis
  worker:
    build: ./apps/worker
    command: npm run start:dev
    depends_on:
      - postgis
      - redis
  web:
    build: ./apps/web
    command: npm run dev
    ports:
      - "3000:3000"
    depends_on:
      - api
